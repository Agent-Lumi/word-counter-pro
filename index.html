<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter Pro - Advanced Text Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            padding: 40px 0;
        }
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        .main-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .input-section {
            margin-bottom: 25px;
        }
        textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1em;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .option-btn {
            padding: 10px 20px;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .option-btn:hover, .option-btn.active {
            border-color: #667eea;
            background: #f3f4ff;
            color: #667eea;
        }
        .analyze-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }
        .stat-card {
            background: #f9fafb;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            font-weight: 700;
            color: #667eea;
        }
        .stat-label {
            color: #6b7280;
            font-size: 0.9em;
            margin-top: 5px;
        }
        .keyword-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e5e7eb;
        }
        .keyword-section h3 {
            margin-bottom: 15px;
            color: #1f2937;
        }
        .keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .keyword {
            background: #f3f4ff;
            color: #667eea;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        .reading-time {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
        }
        .reading-time .time {
            font-size: 1.8em;
            font-weight: 700;
        }
        footer {
            text-align: center;
            color: white;
            padding: 30px;
            opacity: 0.8;
        }
        footer a {
            color: white;
        }
        @media (max-width: 600px) {
            header h1 { font-size: 1.8em; }
            .results { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Word Counter Pro</h1>
            <p>Advanced text analysis with reading time & keyword density</p>
        </header>
        
        <div class="main-card">
            <div class="input-section">
                <textarea id="textInput" placeholder="Paste or type your text here..."></textarea>
            </div>
            
            <div class="options">
                <button class="option-btn active" onclick="setMode('words')">Words</button>
                <button class="option-btn" onclick="setMode('chars')">Characters</button>
                <button class="option-btn" onclick="setMode('sentences')">Sentences</button>
                <button class="option-btn" onclick="setMode('paragraphs')">Paragraphs</button>
            </div>
            
            <button class="analyze-btn" onclick="analyzeText()">🔍 Analyze Text</button>
            
            <div id="results" class="results" style="display: none;">
                <div class="stat-card">
                    <div class="stat-value" id="wordCount">0</div>
                    <div class="stat-label">Words</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="charCount">0</div>
                    <div class="stat-label">Characters</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="sentenceCount">0</div>
                    <div class="stat-label">Sentences</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="paragraphCount">0</div>
                    <div class="stat-label">Paragraphs</div>
                </div>
            </div>
            
            <div id="readingTime" class="reading-time" style="display: none;">
                <div class="time" id="readTimeValue">0 min read</div>
                <div>Based on average reading speed (200 WPM)</div>
            </div>
            
            <div id="keywordSection" class="keyword-section" style="display: none;">
                <h3>🔑 Top Keywords</h3>
                <div class="keywords" id="keywords"></div>
            </div>
        </div>
        
        <footer>
            <p>Made with 💡 by <a href="https://github.com/Agent-Lumi">Lumi</a> for @shalkith</p>
        </footer>
    </div>
    
    <script>
        let currentMode = 'words';
        
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        function analyzeText() {
            const text = document.getElementById('textInput').value.trim();
            
            if (!text) {
                alert('Please enter some text to analyze');
                return;
            }
            
            // Count statistics
            const words = text.split(/\s+/).filter(w => w.length > 0).length;
            const chars = text.length;
            const charsNoSpaces = text.replace(/\s/g, '').length;
            const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0).length;
            const paragraphs = text.split(/\n\n+/).filter(p => p.trim().length > 0).length;
            
            // Update display
            document.getElementById('wordCount').textContent = words.toLocaleString();
            document.getElementById('charCount').textContent = chars.toLocaleString();
            document.getElementById('sentenceCount').textContent = sentences.toLocaleString();
            document.getElementById('paragraphCount').textContent = paragraphs.toLocaleString();
            
            // Show results
            document.getElementById('results').style.display = 'grid';
            
            // Calculate reading time
            const minutes = Math.ceil(words / 200);
            const timeText = minutes < 1 ? '< 1 min read' : minutes + ' min read';
            document.getElementById('readTimeValue').textContent = timeText;
            document.getElementById('readingTime').style.display = 'block';
            
            // Extract keywords
            const keywords = extractKeywords(text);
            displayKeywords(keywords);
        }
        
        function extractKeywords(text) {
            // Common words to exclude
            const stopWords = new Set(['the', 'a', 'an', 'and', 'or', 'but', 'in', 'on', 'at', 'to', 'for', 'of', 'with', 'by', 'is', 'are', 'was', 'were', 'be', 'been', 'have', 'has', 'had', 'do', 'does', 'did', 'will', 'would', 'could', 'should', 'may', 'might', 'must', 'can', 'this', 'that', 'these', 'those', 'i', 'you', 'he', 'she', 'it', 'we', 'they', 'me', 'him', 'her', 'us', 'them']);
            
            const words = text.toLowerCase()
                .replace(/[^a-zA-Z\s]/g, '')
                .split(/\s+/)
                .filter(w => w.length > 3 && !stopWords.has(w));
            
            const frequency = {};
            words.forEach(word => {
                frequency[word] = (frequency[word] || 0) + 1;
            });
            
            return Object.entries(frequency)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);
        }
        
        function displayKeywords(keywords) {
            const container = document.getElementById('keywords');
            container.innerHTML = '';
            
            if (keywords.length === 0) {
                container.innerHTML = '<span class="keyword">No significant keywords found</span>';
            } else {
                keywords.forEach(([word, count]) => {
                    const span = document.createElement('span');
                    span.className = 'keyword';
                    span.textContent = `${word} (${count})`;
                    container.appendChild(span);
                });
            }
            
            document.getElementById('keywordSection').style.display = 'block';
        }
        
        // Auto-analyze on paste
        document.getElementById('textInput').addEventListener('paste', () => {
            setTimeout(analyzeText, 100);
        });
    </script>
</body>
</html>
